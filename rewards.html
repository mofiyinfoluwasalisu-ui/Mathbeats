<!DOCTYPE html>
<html lang="en" data-page="rewards">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MathBeats — Rewards</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 100 100" width="44" height="44" aria-hidden="true">
        <circle cx="50" cy="50" r="45" fill="url(#g)"/>
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0" stop-color="#ffcc70"/>
            <stop offset="1" stop-color="#ff6b6b"/>
          </linearGradient>
        </defs>
        <text x="50%" y="57%" text-anchor="middle" font-size="36" fill="#2b2b2b" font-family="Verdana">M</text>
      </svg>
      <h1>MathBeats</h1>
    </div>

    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="learn.html" class="nav-link">Learn Terms</a>
      <a href="game.html" class="nav-link">Game</a>
      <a href="rewards.html" class="nav-link">Rewards</a>
    </nav>
  </header>

  <main class="container">
    <section class="rewards-panel">
      <h2>Your Badges & Progress</h2>
      <div class="badges-grid" id="badges-grid">
        <!-- badges inserted by script.js -->
      </div>

      <div class="progress">
        <p>Total Points: <strong id="total-points">0</strong></p>
        <p>Highest Level: <strong id="highest-level">1</strong></p>
        <button class="small" id="reset-data">Reset Progress</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© MathBeats • Rewards that motivate</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
